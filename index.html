<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎂</title><style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  text-align: center;
  color: white;
}

.btn{
  padding:10px 20px;
  background:#ff4081;
  border:none;
  border-radius:20px;
  color:white;
  margin-top:15px;
}

.card{display:none;margin-top:20px}
img{width:220px;margin-top:15px;border-radius:10px}
</style></head><body><h1>🎉 Happy Birthday 🎉</h1>
<button class="btn" onclick="showSurprise()">Open Surprise 🎁</button><div class="card" id="box"><p id="msg"></p><img id="cake" src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Birthday_cake_with_candles.jpg"><p id="cakeText" style="display:none">🎉 Happy Birthday 🎂 My Love 💖</p><button class="btn" id="btn" onclick="cutCake()">Cut Cake 🎂</button>

<audio id="music">
  <source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid" type="audio/mpeg">
</audio></div><script>
let text="Happy Birthday my love 💖\nAvi aap jese smile kr rhi ho wese hi humesa smile karti rho 😊\nI love you 😘💖";
let i=0;

function type(){
 if(i<text.length){
  document.getElementById("msg").innerHTML+=text[i]=="\n"?"<br>":text[i];
  i++;
  setTimeout(type,40);
 }
}

function showSurprise(){
 document.getElementById("box").style.display="block";
 document.getElementById("music").play().catch(()=>{});
 type();
}

function cutCake(){
 document.getElementById("cake").src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Cake_slice.jpg/320px-Cake_slice.jpg";
 document.getElementById("cakeText").style.display="block";

 let b=document.getElementById("btn");
 b.innerText="Show Me 💖";
 b.onclick=function(){
  document.getElementById("cake").src="YOUR_IMAGE_LINK_HERE";
 };
}
</script></body>
</html>
