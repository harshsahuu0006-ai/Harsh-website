<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎂</title>

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  color:white;
  background: linear-gradient(135deg,#ff4e50,#fc913a,#f9d423);
}

h1{
  margin-top:20px;
}

button{
  padding:12px 20px;
  margin-top:15px;
  border:none;
  border-radius:25px;
  background:#ff0066;
  color:white;
  font-size:16px;
}

#box{
  display:none;
}

img{
  width:220px;
  border-radius:15px;
  margin-top:15px;
}

#finalText{
  display:none;
  font-size:20px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday 🎉</h1>

<button onclick="openBox()">Open Surprise 🎁</button>

<div id="box">

<p id="msg"></p>

<img id="cake" src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Birthday_cake_with_candles.jpg">

<p id="finalText">🎉 Happy Birthday 🎂 My Love 💖</p>

<button id="btn" onclick="cutCake()">Cut Cake 🎂</button>

<audio id="music" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b7b6b0f3.mp3?filename=happy-birthday-to-you-12233.mp3"></audio>

</div>

<script>

// typing message
let text = "Happy Birthday my love 💖\nAvi aap jese smile kr rhi ho wese hi humesa smile karti rho 😊\nor hum apke sath humesa hai 💕\nI love you 😘💖\nMeri babuu ❤️";
let i=0;

function type(){
  if(i<text.length){
    document.getElementById("msg").innerHTML += text[i]=="\n"?"<br>":text[i];
    i++;
    setTimeout(type,40);
  }
}

// open surprise
function openBox(){
  document.getElementById("box").style.display="block";
  document.getElementById("music").play();
  type();
}

// cake cut
function cutCake(){
  document.getElementById("cake").src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Cake_slice.jpg/320px-Cake_slice.jpg";
  document.getElementById("finalText").style.display="block";

  let b=document.getElementById("btn");
  b.innerText="Show Me 💖";

  b.onclick=function(){
    document.getElementById("cake").src="YOUR_IMAGE_LINK_HERE";
  };
}

</script>

</body>
  </html>
